<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-red-400 flex items-center justify-center h-screen text-white">

  <form id="loginForm" class="bg-gray-900 p-8 rounded-xl w-90 h-[50%] space-y-4">
    <h2 class="text-xl font-bold text-center">Admin Login</h2>

    <input type="text" id="username" placeholder="Username"
      class="w-full p-3 rounded bg-black border border-gray-700">

    <input type="password" id="password" placeholder="Password"
      class="w-full p-3 rounded bg-black border border-gray-700">

    <button class="w-full bg-gold text-white py-2 rounded hover:bg-gray-800 transition duration-300">
      Login
    </button>
  </form>

<script src="login.js"></script>
</body>
</html>
